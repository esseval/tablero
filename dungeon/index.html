<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dungeon Explorer</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<h1>⚔ Dungeon Explorer</h1>

<div id="io-bar">
  <button id="btn-export">Exportar tablero</button>
  <label><button id="btn-import-trigger">Importar tablero</button></label>
  <input type="file" id="file-import" accept=".json">
  <button class="danger" id="btn-restart">Nueva partida</button>
  <button id="btn-end-turn" class="primary">Terminar turno</button>
</div>

<div id="layout">
  <div id="log-wrap">
    <div id="controls">
      WASD / ↑↓←→ para moverse &nbsp;|&nbsp; Click en casilla adyacente
    </div>
    <div id="log"></div>
  </div>   

  <div id="hud">
    <div class="hud-title">Estado</div>
    <div>
      <div class="stat-row">
        <span class="stat-label">Vida</span>
        <span class="stat-value" id="stat-hp-val">20/20</span>
      </div>
      <div class="bar-wrap"><div class="bar bar-hp" id="bar-hp" style="width:100%"></div></div>
    </div>
    <div class="stat-row"><span class="stat-label">Ataque</span><span class="stat-value" id="stat-atk-val">5</span></div>
    <div class="stat-row"><span class="stat-label">Defensa</span><span class="stat-value" id="stat-def-val">3</span></div>
    <div class="stat-row"><span class="stat-label">Oro</span><span class="stat-value" id="stat-gold-val">0</span></div>

    <div class="hud-title">Experiencia</div>
    <div class="stat-row"><span class="stat-label">Nivel</span><span class="stat-value" id="stat-level-val">1</span></div>
    <div class="stat-row">
      <span class="stat-label">XP</span>
      <span class="stat-value stat-xp" id="stat-xp-val">0/50</span>
    </div>
    <div class="bar-wrap"><div class="bar bar-xp" id="bar-xp" style="width:0%"></div></div>

    <div class="hud-title">Dados</div>
    <div class="stat-row">
      <span class="stat-label">Ataque</span>
      <span class="stat-value" id="stat-dice-atk">0</span>
    </div>
    <div class="stat-row">
      <span class="stat-label">Defensa</span>
      <span class="stat-value" id="stat-dice-def">0</span>
    </div>
    <div class="stat-row">
      <span class="stat-label">Movimiento</span>
      <span class="stat-value" id="stat-dice-mov">0</span>
    </div>

    <div class="hud-title">Turnos</div>
    <div class="stat-row"><span class="stat-label">Turno</span><span class="stat-value" id="stat-turns-val">0</span></div>
    <div class="stat-row"><span class="stat-label">Pasos</span><span class="stat-value" id="stat-steps-val">0</span></div>

    <div class="hud-title">Minimapa</div>
    <canvas id="minimap" width="12" height="12"></canvas>
  </div>

  <div>
    <div id="board" tabindex="0"></div>
  </div>
</div>

<div id="overlay">
  <div id="modal">
    <h2 id="modal-title">Título</h2>
    <p id="modal-body">Cuerpo</p>
    <div id="modal-btns"></div>
  </div>
</div>

<script type="module" src="js/main.js"></script>
</body>
</html>
