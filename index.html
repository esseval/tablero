<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tablero de Juegos</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}

body{
  background:#0d0d0d;color:#ccc;font-family:monospace;
  display:flex;flex-direction:column;align-items:center;
  min-height:100vh;padding:2rem 1rem;
}

h1{
  color:#e8c84a;font-size:1.4rem;letter-spacing:5px;
  text-transform:uppercase;margin-bottom:.4rem;
}

.subtitle{
  color:#444;font-size:.7rem;letter-spacing:3px;
  text-transform:uppercase;margin-bottom:3rem;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
  gap:1.2rem;
  width:100%;max-width:860px;
}

.card{
  background:#111;border:1px solid #2a2a2a;border-radius:8px;
  padding:1.5rem 1.2rem;text-decoration:none;color:inherit;
  display:flex;flex-direction:column;gap:.6rem;
  transition:border-color .2s,background .2s;
  position:relative;overflow:hidden;
}
.card:hover{border-color:#e8c84a;background:#161610}
.card:hover .card-icon{opacity:1}

.card-icon{font-size:2.2rem;opacity:.75;transition:opacity .2s}
.card-name{color:#e8c84a;font-size:.9rem;letter-spacing:2px;text-transform:uppercase}
.card-desc{color:#555;font-size:.7rem;line-height:1.6}

.card.disabled{pointer-events:none;opacity:.35}
.card.disabled::after{
  content:'PRÓXIMAMENTE';position:absolute;
  top:.6rem;right:.6rem;
  font-size:.55rem;letter-spacing:2px;color:#333;
}
</style>
</head>
<body>

<h1>Tablero</h1>
<div class="subtitle">seleccioná un juego</div>

<div class="grid">

  <a class="card" href="dungeon/">
    <div class="card-icon">⚔</div>
    <div class="card-name">Dungeon Explorer</div>
    <div class="card-desc">Explorá mazmorras, combatí enemigos y sobreviví al dungeon.</div>
  </a>

  <a class="card disabled" href="senet/">
    <div class="card-icon">𓀀</div>
    <div class="card-name">Senet</div>
    <div class="card-desc">El juego de tablero del antiguo Egipto.</div>
  </a>

  <a class="card disabled" href="zombies/">
    <div class="card-icon">🧟</div>
    <div class="card-name">Zombies in my Pocket</div>
    <div class="card-desc">Sobreviví una noche rodeado de zombies.</div>
  </a>

</div>

</body>
</html>
